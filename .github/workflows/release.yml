name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and Release Windows Portable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: AudioMatrixRouter/WebUI/package-lock.json

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install web dependencies
        working-directory: AudioMatrixRouter/WebUI
        run: npm ci

      - name: Build desktop web UI bundle
        working-directory: AudioMatrixRouter/WebUI
        run: npm run build:windows

      - name: Publish portable binary
        run: >-
          dotnet publish AudioMatrixRouter/AudioMatrixRouter.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PublishTrimmed=false
          -p:Platform=x64
          -o artifacts/windows-portable

      - name: Package portable zip
        shell: pwsh
        run: |
          Compress-Archive -Path artifacts/windows-portable/* -DestinationPath artifacts/audio-router-matrix-win-x64-portable.zip -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/audio-router-matrix-win-x64-portable.zip
          generate_release_notes: true