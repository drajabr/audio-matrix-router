name: Build and Release

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      release:
        description: Create a GitHub Release and increment the patch version
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  version:
    name: Resolve Version
    runs-on: ubuntu-latest

    outputs:
      app_version: ${{ steps.resolve.outputs.app_version }}
      release_requested: ${{ steps.resolve.outputs.release_requested }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: resolve
        shell: bash
        run: |
          current_version="$(tr -d '\r\n' < VERSION)"
          if [[ ! "$current_version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must be in v0.1.9 format"
            exit 1
          fi

          release_requested=false
          app_version="$current_version"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.release }}" == "true" ]]; then
            version_core="${current_version#v}"
            IFS='.' read -r major minor patch <<< "$version_core"
            next_patch=$((patch + 1))
            app_version="v${major}.${minor}.${next_patch}"
            release_requested=true

            printf '%s\n' "$app_version" > VERSION

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add VERSION
            git commit -m "chore: bump version to $app_version"
            git tag "$app_version"
            git push origin HEAD:main
            git push origin "$app_version"
          fi

          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "release_requested=$release_requested" >> "$GITHUB_OUTPUT"

  web-preview:
    name: Build Web Preview
    runs-on: ubuntu-latest
    needs: version

    defaults:
      run:
        working-directory: AudioMatrixRouter/WebUI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: AudioMatrixRouter/WebUI/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web preview
        env:
          VITE_APP_VERSION: ${{ needs.version.outputs.app_version }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build:web

      - name: Upload web preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-preview-dist
          path: AudioMatrixRouter/WebUI/dist
          if-no-files-found: error

  windows-portable:
    name: Build Windows Portable
    runs-on: windows-latest
    needs: version

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: AudioMatrixRouter/WebUI/package-lock.json

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install web dependencies
        working-directory: AudioMatrixRouter/WebUI
        run: npm ci

      - name: Build web UI
        working-directory: AudioMatrixRouter/WebUI
        env:
          VITE_APP_VERSION: ${{ needs.version.outputs.app_version }}
        run: npm run build

      - name: Restore .NET dependencies
        run: dotnet restore AudioMatrixRouter/AudioMatrixRouter.csproj

      - name: Publish portable binary
        run: >-
          dotnet publish AudioMatrixRouter/AudioMatrixRouter.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PublishTrimmed=false
          -p:Platform=x64
          -o artifacts/windows-portable

      - name: Package portable zip
        shell: pwsh
        run: |
          Compress-Archive -Path artifacts/windows-portable/* -DestinationPath artifacts/audio-router-matrix-win-x64-portable.zip -Force

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: audio-router-matrix-win-x64-portable
          path: artifacts/audio-router-matrix-win-x64-portable.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: needs.version.outputs.release_requested == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.app_version }}
          name: ${{ needs.version.outputs.app_version }}
          files: artifacts/audio-router-matrix-win-x64-portable.zip
          generate_release_notes: true
